<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Libor Krížik Anagram App</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#181a1b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/static/icon-192.png">

<link rel="icon" type="image/png" href="/static/icon-192.png">

<style>
body {
    font-family: Arial, Helvetica;
}
.anagram-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
.anagram-word {
    min-width: 60px;
}
.logo-container img {
    transition: transform 0.3s ease;
}
.logo-container img:hover {
    transform: scale(1.1);
}
</style>

</head>
<body>

<div class="logo-container">
    <a href="https://www.liborkrizik.com" target="_blank">
        <img src="/static/2035maxhdjpg.jpg"
             alt="Libor Krizik Logo"
             style="max-width:100%;max-height:200px;">
    </a>
</div>

<h2>⭐️ Iterative Anagram App ⭐️</h2>
<i>Multi-word anagrams calculated instantly</i>

<form id="anagramForm">
    <b>Words to anagram:</b>
    <input size="40" name="letters" type="text">
    <input type="submit" value="Anagram">
</form>

<h4 id="stats"></h4>

<div class="anagram-list" id="results"></div>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
